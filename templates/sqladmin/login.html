{% extends "sqladmin/base.html" %}
{% block body %}
<div class="admin-login-shell">
  <form class="card card-md admin-login-card" action="{{ request.url_for('admin:login').path }}" method="POST" autocomplete="off">
    <div class="card-body p-4">
      <div class="admin-login-brand">BWID Operations</div>
      <h2 class="card-title admin-login-title">Sign in to {{ admin.title }}</h2>

      <div class="mb-3">
        <label class="form-label">Username</label>
        {% if error %}
        <input name="username" type="text" class="form-control is-invalid" placeholder="Enter username" autocomplete="off">
        {% else %}
        <input name="username" type="text" class="form-control" placeholder="Enter username" autocomplete="off">
        {% endif %}
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        {% if error %}
        <input name="password" type="password" class="form-control is-invalid" placeholder="Enter password" autocomplete="off">
        <div class="invalid-feedback">{{ error }}</div>
        {% else %}
        <input name="password" type="password" class="form-control" placeholder="Enter password" autocomplete="off">
        {% endif %}
      </div>

      <div class="form-footer">
        <button type="submit" class="btn btn-primary w-100">Sign In</button>
      </div>

      <p class="admin-login-hint">Use an active admin account to continue.</p>
    </div>
  </form>
</div>
{% endblock %}
